version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
    ignore:
      - dependency-name: "typescript"      # TS 7 major
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: /agents
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # LangChain 1.x is a large breaking migration — do it deliberately.
      - dependency-name: "langchain"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langchain-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langchain-openai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "langgraph"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
