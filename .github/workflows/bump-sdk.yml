name: bump sdk
on:
  repository_dispatch:
    types: [sdk-released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit macp-sdk-typescript version (blank = event payload / latest)'
        required: false
        default: ''
jobs:
  bump:
    uses: multiagentcoordinationprotocol/macp-ci/.github/workflows/bump-consume.yml@v1
    with:
      ecosystem: npm
      package: macp-sdk-typescript
      version: ${{ github.event.inputs.version }}
    secrets: inherit
