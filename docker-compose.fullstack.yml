# Full-stack v0.5.0 real-LLM end-to-end harness.
#
# Brings up the complete MACP stack on the runtime v0.5.0 / macp-proto 0.1.6+
# release so the example agents (LangGraph / LangChain / CrewAI / custom)
# actually call a real LLM and drive a decision session on the runtime,
# observed by the control-plane.
#
# Auth: JWT throughout. auth-service mints RS256 JWTs; the runtime validates
# them via the auth-service JWKS (issuer/audience must match). macp-playground
# mints a per-agent JWT on every spawn; the control-plane mints an observer JWT.
#
# v0.5.0 note: the runtime image no longer bakes `MACP_ALLOW_INSECURE=1` and
# refuses to start without auth unless it is set explicitly — we set it below
# (required for plaintext gRPC regardless of JWT auth). The runtime also exposes
# a Prometheus text endpoint on `MACP_METRICS_ADDR` (:9464 here).
#
# Prereqs:
#   runtime      — pulled from ghcr (no local Rust build needed)
#   control-plane / auth-service / playground — built locally at :0.5.0
#     (rebuild macp-playground from this branch to pick up the absorption changes)
#
# Run:  OPENAI_API_KEY=sk-... docker compose -f docker-compose.fullstack.yml up

services:
  auth-service:
    image: macp-auth-service:0.5.0
    ports:
      - '3200:3200'
    environment:
      PORT: '3200'
      MACP_AUTH_ISSUER: macp-auth-service
      MACP_AUTH_AUDIENCE: macp-runtime
      MACP_AUTH_DEFAULT_TTL_SECONDS: '3600'
      MACP_AUTH_MAX_TTL_SECONDS: '7200'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3200/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 10

  runtime:
    image: ghcr.io/multiagentcoordinationprotocol/macp-runtime:0.5.0
    ports:
      - '50051:50051'
      # Prometheus text endpoint (v0.5.0): curl http://localhost:9464/metrics
      - '9464:9464'
    environment:
      MACP_BIND_ADDR: 0.0.0.0:50051
      # v0.5.0 no longer bakes this into the image — required for plaintext gRPC.
      MACP_ALLOW_INSECURE: '1'
      MACP_MEMORY_ONLY: '1'
      # Prometheus text endpoint (mode counters etc.) — observability demo surface.
      MACP_METRICS_ADDR: 0.0.0.0:9464
      # JWT validation against the auth-service JWKS.
      MACP_AUTH_ISSUER: macp-auth-service
      MACP_AUTH_AUDIENCE: macp-runtime
      MACP_AUTH_JWKS_URL: http://auth-service:3200/.well-known/jwks.json
      MACP_AUTH_JWKS_TTL_SECS: '60'
      # --- Read-only policy registry variant (v0.5.0) -------------------------
      # Uncomment to have the runtime own the policy registry from disk instead
      # of accepting RegisterPolicy RPCs. Pair with REGISTER_POLICIES_ON_LAUNCH
      # 'false' on macp-playground below; the registrar then verifies presence
      # (managed_by_runtime) rather than mutating. See docs/policy-authoring.md
      # and src/policy/policy-registrar.service.ts.
      # MACP_POLICIES_DIR: /policies
    # volumes:
    #   - ./policies:/policies:ro
    depends_on:
      auth-service:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: macp_control_plane
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    image: macp-control-plane:0.5.0
    command: ['node', 'dist/db/migrate.js']
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/macp_control_plane
    depends_on:
      postgres:
        condition: service_healthy

  macp-control-plane:
    image: macp-control-plane:0.5.0
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/macp_control_plane
      RUNTIME_ADDRESS: runtime:50051
      RUNTIME_TLS: 'false'
      RUNTIME_ALLOW_INSECURE: 'true'
      RUNTIME_DEV_AGENT_ID: macp-control-plane
      MACP_AUTH_SERVICE_URL: http://auth-service:3200
      # Production guards: the CP refuses to boot without these set.
      AUTH_API_KEYS: demo-key
      STREAM_HUB_STRATEGY: memory
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      runtime:
        condition: service_started
      auth-service:
        condition: service_healthy

  macp-playground:
    image: macp-playground:0.5.0
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: '3000'
      PACKS_DIR: /app/packs
      REGISTRY_CACHE_TTL_MS: '0'
      AUTO_BOOTSTRAP_EXAMPLE_AGENTS: 'true'
      # Set 'false' when the runtime owns the registry via MACP_POLICIES_DIR
      # (see the read-only variant on the runtime service above).
      REGISTER_POLICIES_ON_LAUNCH: 'true'
      EXAMPLE_AGENT_PYTHON_PATH: python3
      # Direct-agent-auth: agents open their own gRPC channel to the runtime.
      MACP_RUNTIME_ADDRESS: runtime:50051
      MACP_RUNTIME_TLS: 'false'
      MACP_RUNTIME_ALLOW_INSECURE: 'true'
      # AUTH-2: every spawn mints a JWT via the auth-service.
      MACP_AUTH_SERVICE_URL: http://auth-service:3200
      MACP_AUTH_TOKEN_TTL_SECONDS: '3600'
      # Real LLM key — agents (LangGraph/LangChain/CrewAI) call OpenAI.
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in the environment}
    depends_on:
      runtime:
        condition: service_started
      auth-service:
        condition: service_healthy
